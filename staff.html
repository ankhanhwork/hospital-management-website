<script>
    // 1. DATA MOCKUP =====================================
    // Using generated sprite sheet of Vietnamese medical staff with CSS background-position
    // Assuming a 4x4 grid (16 images total)
    // CSS sprite matching based on gender and age
    // We have two 2x4 sprite sheets (8 images each). Row 0 (idx 0-3) = young, Row 1 (idx 4-7) = older.
    const getSpriteStyle = (gender, index) => {
        const col = index % 4;
        const row = Math.floor(index / 4);
        
        const posX = col * 33.3333; // 4 columns
        // background-size: 400% auto keeps original aspect ratio.
        // Image is 1:1, so background is 4x wide and 4x tall relative to 84px container (= 336px tall).
        // Each of the 2 rows is 168px tall. Container is 84px tall.
        // row 0: shift down slightly (~12%) to crop the top headroom and show face.
        // row 1: shift down to (~75%) to crop headroom of the second row cell.
        const posY = row === 0 ? 12 : 75; 
        
        const file = gender === 'M' ? 'staff-men-sprite.png' : 'staff-women-sprite.png';
        return `background-image: url('${file}'); background-size: 400% auto; background-position: ${posX}% ${posY}%; background-repeat: no-repeat;`;
    };

    const allStaff = [
        // Males
        { id: 1, name: 'BS. Lê Nam Hải', gender: 'M', spriteIndex: 0, role: 'Bác sĩ trực', dept: 'Cấp cứu', status: 'Đang trực', experience: '6 năm', currentShift: 'Ca Sáng (06:00 - 14:00)' },
        { id: 3, name: 'BS. Nguyễn Văn Tùng', gender: 'M', spriteIndex: 1, role: 'Bác sĩ trực', dept: 'Nội Tổng Quát', status: 'Đang điều phối', experience: '5 năm', currentShift: 'Hỗ trợ Phân bổ Tầng 3' },
        { id: 7, name: 'BS. Đặng Việt Cường', gender: 'M', spriteIndex: 2, role: 'Bác sĩ trực', dept: 'Thần Kinh', status: 'Đang trực', experience: '4 năm', currentShift: 'Ca Sáng (06:00 - 14:00)' },
        { id: 9, name: 'BS. Trần Hùng', gender: 'M', spriteIndex: 3, role: 'Bác sĩ trực', dept: 'Cấp cứu', status: 'Đang trực', experience: '3 năm', currentShift: 'Khu vực Hồi sức đỏ' },
        { id: 4, name: 'BS. Phạm Hoàng Long', gender: 'M', spriteIndex: 4, role: 'Trưởng ca', dept: 'Cấp cứu', status: 'Nghỉ phép', experience: '15 năm', currentShift: 'Nghỉ phép năm (Đến 05/06)' },
        { id: 10, name: 'BS. Bùi Quang Tuấn', gender: 'M', spriteIndex: 5, role: 'Trưởng ca', dept: 'Ngoại Khoa', status: 'Sẵn sàng', experience: '18 năm', currentShift: 'Chuyên môn hội chẩn' },
        { id: 13, name: 'BS. Phan Anh Tú', gender: 'M', spriteIndex: 6, role: 'Bác sĩ trực', dept: 'Thần Kinh', status: 'Đang trực', experience: '14 năm', currentShift: 'Gác trực IC' },
        { id: 15, name: 'BS. Đỗ Duy Khoa', gender: 'M', spriteIndex: 7, role: 'Bác sĩ trực', dept: 'Cấp cứu', status: 'Sẵn sàng', experience: '11 năm', currentShift: 'Trực máy điều phối T4' },
        
        // Females
        { id: 5, name: 'BS. Vũ Thùy Linh', gender: 'F', spriteIndex: 0, role: 'Chuyên khoa', dept: 'Ngoại Khoa', status: 'Sẵn sàng', experience: '7 năm', currentShift: 'On-call ưu tiên' },
        { id: 11, name: 'BS. Võ Thị Trang', gender: 'F', spriteIndex: 1, role: 'Bác sĩ trực', dept: 'Tim Mạch', status: 'Nghỉ phép', experience: '4 năm', currentShift: 'Thai sản (Đến 12/08)' },
        { id: 12, name: 'BS. Hoàng Thanh Mai', gender: 'F', spriteIndex: 2, role: 'Bác sĩ trực', dept: 'Nội Tổng Quát', status: 'Sẵn sàng', experience: '2 năm', currentShift: 'Dự phòng Ca Chiều' },
        { id: 2, name: 'BS. Trần Kim Oanh', gender: 'F', spriteIndex: 3, role: 'Chuyên khoa', dept: 'Tim Mạch', status: 'Sẵn sàng', experience: '5 năm', currentShift: 'Ca trực tiếp theo: Tối' },
        { id: 6, name: 'BS. Lê Ánh Nguyệt', gender: 'F', spriteIndex: 4, role: 'Bác sĩ chuyên khoa', dept: 'Tim Mạch', status: 'Bận', experience: '14 năm', currentShift: 'Đang trực Phòng mổ 2' },
        { id: 8, name: 'BS. Mai Phương Chi', gender: 'F', spriteIndex: 5, role: 'Chuyên khoa', dept: 'Nội Tổng Quát', status: 'Sẵn sàng', experience: '15 năm', currentShift: 'Khám ngoại trú (Phòng 102)' },
        { id: 14, name: 'BS. Lý Phương Lan', gender: 'F', spriteIndex: 6, role: 'Chuyên khoa', dept: 'Nội Tổng Quát', status: 'Đang điều phối', experience: '12 năm', currentShift: 'Hỗ trợ Khoa Lây nhiễm' },
        { id: 16, name: 'BS. Trịnh Hải Băng', gender: 'F', spriteIndex: 7, role: 'Trưởng ca', dept: 'Thần Kinh', status: 'Bận', experience: '20 năm', currentShift: 'Đang tham gia Hội thảo' }
    ];

    // Optional: Sort by ID to keep previous visual order, or just keep grouped. I will sort them by ID to show variety
    allStaff.sort((a,b) => a.id - b.id);

    // 2. UTILS & STYLING =================================
    const showToast = (message) => {
        const toast = document.getElementById('toast');
        const toastMsg = document.getElementById('toast-message');
        toastMsg.innerText = message;
        toast.classList.remove('translate-y-24', 'opacity-0');
        setTimeout(() => toast.classList.add('translate-y-24', 'opacity-0'), 3000);
    };

    const getStatusStyle = (status) => {
        switch(status) {
            case 'Sẵn sàng': return { badge: 'bg-emerald-50 text-emerald-600 border-emerald-100', dot: 'bg-emerald-500' };
            case 'Đang trực': return { badge: 'bg-blue-50 text-blue-600 border-blue-100', dot: 'bg-blue-500' };
            case 'Đang điều phối': return { badge: 'bg-indigo-50 text-indigo-600 border-indigo-100', dot: 'bg-indigo-500' };
            case 'Nghỉ phép': return { badge: 'bg-slate-100 text-slate-500 border-slate-200', dot: 'bg-slate-400' };
            case 'Bận': return { badge: 'bg-red-50 text-red-600 border-red-100', dot: 'bg-red-500' };
            default: return { badge: 'bg-slate-50 text-slate-600 border-slate-200', dot: 'bg-slate-300' };
        }
    };

    // 3. RENDER LOGIC ====================================
    const grid = document.getElementById('staff-grid');
    
    const renderStaff = (list) => {
        grid.innerHTML = list.map((s, index) => {
            const styles = getStatusStyle(s.status);
            // Added animation stagger for smooth entry
            const delay = (index % 12) * 50; 
            
            return `
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 hover:shadow-md transition-all duration-300 group flex flex-col items-center text-center relative overflow-hidden animate-in" style="animation-delay: ${delay}ms; opacity: 0; fill-mode: forwards; animation: slideIn 0.4s ease-out forwards;">
                <!-- 3 Dots Menu -->
                <div class="absolute top-4 right-4 z-10">
                    <button class="w-8 h-8 flex items-center justify-center rounded-full text-slate-300 hover:text-slate-600 hover:bg-slate-50 transition-colors" onclick="event.stopPropagation(); showToast('Mở tùy chọn nhanh cho ${s.name}');">
                        <span class="material-symbols-outlined text-[20px]">more_vert</span>
                    </button>
                </div>

                <!-- Avatar -->
                <div class="w-[84px] h-[84px] mb-4 inline-block relative cursor-pointer" onclick="openProfile(${s.id})">
                   <div class="w-full h-full rounded-full border-[3px] border-white shadow-sm hover:scale-105 transition-transform duration-300" style="${getSpriteStyle(s.gender, s.spriteIndex)}"></div>
                   <div class="absolute bottom-1 right-1 w-4 h-4 rounded-full border-2 border-white ${styles.dot} shadow-sm"></div>
                </div>

                <!-- Info -->
                <h3 class="font-bold text-lg text-slate-800 leading-tight cursor-pointer hover:text-primary transition-colors" onclick="openProfile(${s.id})">${s.name}</h3>
                <p class="text-[11px] font-bold text-slate-400 uppercase tracking-wider mt-1 mb-4">${s.role}</p>
                
                <!-- Inner card info -->
                <div class="w-full bg-slate-50/70 rounded-xl p-3 grid grid-cols-2 gap-2 text-left mb-4 flex-1">
                    <div>
                        <p class="text-[10px] text-slate-400 font-bold uppercase">Khoa</p>
                        <p class="text-[13px] font-bold text-slate-700 truncate" title="${s.dept}">${s.dept}</p>
                    </div>
                    <div>
                        <p class="text-[10px] text-slate-400 font-bold uppercase">Kinh nghiệm</p>
                        <p class="text-[13px] font-bold text-slate-700 truncate">${s.experience}</p>
                    </div>
                    <div class="col-span-2 pt-2 border-t border-slate-200/50">
                        <p class="text-[10px] text-slate-400 font-bold uppercase">Công việc hiện tại</p>
                        <p class="text-[12px] font-medium text-slate-600 leading-snug mt-0.5" title="${s.currentShift}">${s.currentShift}</p>
                    </div>
                </div>
                
                <!-- Bottom Action -->
                <div class="mt-auto w-full flex justify-between items-center bg-white pt-1">
                    <span class="px-2.5 py-1 rounded text-[11px] font-bold border ${styles.badge}">${s.status}</span>
                    <button onclick="openProfile(${s.id})" class="text-[12px] font-bold text-primary px-3 py-1.5 rounded-lg hover:bg-blue-50 transition-colors">Chi tiết</button>
                </div>
            </div>
            `;
        }).join('');
        
        if (list.length === 0) {
            grid.innerHTML = `
                <div class="col-span-full py-20 flex flex-col items-center justify-center text-slate-400">
                    <span class="material-symbols-outlined text-4xl mb-3 text-slate-300">search_off</span>
                    <p class="font-medium text-slate-500">Không tìm thấy hồ sơ nào khớp với bộ lọc.</p>
                </div>
            `;
        }
    };

    // 4. FILTERING & SEARCH LOGIC ========================
    const searchInput = document.getElementById('search-input');
    const filterBtn = document.getElementById('filter-btn');
    const filterPopover = document.getElementById('filter-popover');
    const filterCheckboxes = document.querySelectorAll('#filter-popover input[type="checkbox"]');
    const activeFiltersContainer = document.getElementById('active-filters-container');
    const clearFiltersBtn = document.getElementById('clear-filters');
    const filterBadge = document.getElementById('filter-badge');

    let isFilterOpen = false;

    // Toggle Popover
    filterBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        isFilterOpen = !isFilterOpen;
        if (isFilterOpen) {
            filterPopover.classList.remove('hidden');
            // small delay to allow display:block to apply before animating opacity
            setTimeout(() => {
                filterPopover.classList.remove('scale-95', 'opacity-0');
            }, 10);
            filterBtn.classList.add('ring-2', 'ring-primary/20', 'border-primary');
        } else {
            closeFilters();
        }
    });

    const closeFilters = () => {
        isFilterOpen = false;
        filterPopover.classList.add('scale-95', 'opacity-0');
        filterBtn.classList.remove('ring-2', 'ring-primary/20', 'border-primary');
        setTimeout(() => {
            filterPopover.classList.add('hidden');
        }, 300); // match transition duration
    };

    // Close when clicking outside
    document.addEventListener('click', (e) => {
        if (isFilterOpen && !filterPopover.contains(e.target) && !filterBtn.contains(e.target)) {
            closeFilters();
        }
    });

    // Prevent closing when clicking inside popover
    filterPopover.addEventListener('click', (e) => e.stopPropagation());

    const getActiveFilters = () => {
        const filters = { dept: [], status: [] };
        filterCheckboxes.forEach(cb => {
            if (cb.checked) {
                const group = cb.closest('.filter-group').dataset.group;
                filters[group].push(cb.value);
            }
        });
        return filters;
    };

    const updateGrid = () => {
        const term = searchInput.value.toLowerCase().trim();
        const filters = getActiveFilters();
        
        const activeCount = filters.dept.length + filters.status.length;
        
        // Update Badge
        if (activeCount > 0) {
            filterBadge.innerText = activeCount;
            filterBadge.classList.remove('hidden');
        } else {
            filterBadge.classList.add('hidden');
        }

        // Render Tag Bubbles
        activeFiltersContainer.innerHTML = '';
        Object.entries(filters).forEach(([group, values]) => {
            values.forEach(val => {
                const tag = document.createElement('div');
                tag.className = 'flex items-center gap-1.5 px-3 py-1 bg-white border border-slate-200 rounded-full text-xs font-bold text-slate-600 shadow-sm';
                tag.innerHTML = `
                    <span>${val}</span>
                    <button class="w-4 h-4 rounded-full hover:bg-slate-200 flex flex-col items-center justify-center text-slate-400 hover:text-slate-700 transition-colors" data-val="${val}">
                        <span class="material-symbols-outlined text-[12px]">close</span>
                    </button>
                `;
                // Remove individual filter click
                tag.querySelector('button').addEventListener('click', (e) => {
                    const valueToRemove = e.currentTarget.dataset.val;
                    const cb = Array.from(filterCheckboxes).find(c => c.value === valueToRemove);
                    if (cb) {
                        cb.checked = false;
                        updateGrid();
                    }
                });
                activeFiltersContainer.appendChild(tag);
            });
        });

        // Filter Data
        const filtered = allStaff.filter(s => {
            // Text Search
            const matchesTerm = !term || 
                s.name.toLowerCase().includes(term) || 
                s.dept.toLowerCase().includes(term) || 
                s.role.toLowerCase().includes(term);
                
            // Checkbox filters
            const matchesDept = filters.dept.length === 0 || filters.dept.includes(s.dept);
            const matchesStatus = filters.status.length === 0 || filters.status.includes(s.status);

            return matchesTerm && matchesDept && matchesStatus;
        });

        renderStaff(filtered);
    };

    // Attach listener to individual checkboxes
    filterCheckboxes.forEach(cb => {
        cb.addEventListener('change', updateGrid);
    });

    searchInput.addEventListener('input', updateGrid);

    clearFiltersBtn.addEventListener('click', () => {
        filterCheckboxes.forEach(cb => cb.checked = false);
        searchInput.value = '';
        updateGrid();
        closeFilters();
    });

    // 5. PROFILE DRAWER LOGIC ============================
    const drawerOverlay = document.getElementById('profile-drawer-overlay');
    const drawer = document.getElementById('profile-drawer');
    const closeDrawerBtn = document.getElementById('close-drawer');
    const drawerContent = document.getElementById('drawer-content');

    // Global function to be called from card templates
    window.openProfile = (id) => {
        const staff = allStaff.find(s => s.id === id);
        if (!staff) return;

        const styles = getStatusStyle(staff.status);

        // Populate Content
        drawerContent.innerHTML = `
            <div class="flex flex-col items-center text-center">
                <div class="w-32 h-32 relative mb-5">
                    <div class="w-full h-full rounded-full border-4 border-white shadow-md cursor-pointer" style="${getSpriteStyle(staff.gender, staff.spriteIndex)}"></div>
                    <div class="absolute bottom-2 right-2 w-5 h-5 rounded-full border-[3px] border-white ${styles.dot} shadow-sm"></div>
                </div>
                <h2 class="text-2xl font-bold text-slate-800 font-headline leading-tight">${staff.name}</h2>
                <div class="flex items-center gap-2 mt-2 break-words justify-center">
                     <span class="text-sm font-bold text-primary bg-primary/10 px-3 py-1 rounded-full">${staff.role}</span>
                     <span class="text-sm font-bold border ${styles.badge} px-3 py-1 rounded-full">${staff.status}</span>
                </div>
            </div>

            <div class="mt-10 space-y-6">
                <!-- Section 1: Overview -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-surface p-4 rounded-xl border border-slate-100">
                        <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1 items-center flex gap-1"><span class="material-symbols-outlined text-[14px]">domain</span> Khoa / Trực thuộc</p>
                        <p class="font-bold text-slate-700">${staff.dept}</p>
                    </div>
                    <div class="bg-surface p-4 rounded-xl border border-slate-100">
                        <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1 items-center flex gap-1"><span class="material-symbols-outlined text-[14px]">military_tech</span> Kinh nghiệm</p>
                        <p class="font-bold text-slate-700">${staff.experience}</p>
                    </div>
                </div>

                <!-- Section 2: Current Status Details -->
                <div class="bg-blue-50/50 p-5 rounded-xl border border-blue-100/50">
                    <h4 class="text-xs font-bold text-blue-600 uppercase tracking-widest mb-3 flex items-center gap-2"><span class="material-symbols-outlined text-[16px]">assignment</span> Lịch trình hiện tại</h4>
                    <div class="bg-white rounded-lg p-4 shadow-sm border border-slate-100">
                        <p class="font-bold text-slate-800">${staff.currentShift}</p>
                        <p class="text-xs text-slate-500 mt-1">Ghi chú: Lịch biểu có thể thay đổi trong trường hợp khẩn cấp cấp viện.</p>
                    </div>
                </div>

                <!-- Section 3: Contact Info (Mocked) -->
                <div>
                     <h4 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">Thông tin liên hệ (Nội bộ)</h4>
                     <div class="space-y-3">
                         <div class="flex items-center gap-3 text-sm">
                             <div class="w-8 h-8 rounded bg-slate-100 flex items-center justify-center text-slate-500"><span class="material-symbols-outlined text-[16px]">call</span></div>
                             <span class="font-medium text-slate-700">Máy nhánh: 104${staff.id}</span>
                         </div>
                         <div class="flex items-center gap-3 text-sm">
                             <div class="w-8 h-8 rounded bg-slate-100 flex items-center justify-center text-slate-500"><span class="material-symbols-outlined text-[16px]">mail</span></div>
                             <span class="font-medium text-slate-700">${staff.name.split(' ').pop().toLowerCase().replace(/[^a-z0-9]/g,'')}@hmh.vn</span>
                         </div>
                     </div>
                </div>
            </div>
        `;

        // Show Drawer
        drawerOverlay.classList.remove('opacity-0', 'pointer-events-none');
        drawer.classList.remove('translate-x-full');
        document.body.style.overflow = 'hidden'; // Prevent background scrolling
    };

    const closeDrawer = () => {
        drawerOverlay.classList.add('opacity-0', 'pointer-events-none');
        drawer.classList.add('translate-x-full');
        document.body.style.overflow = '';
    };

    closeDrawerBtn.addEventListener('click', closeDrawer);
    drawerOverlay.addEventListener('click', closeDrawer);


    // Init
    renderStaff(allStaff);

    // Sidebar Toggle Logic
    const sidebarToggleBtn = document.getElementById('sidebar-toggle');
    if (sidebarToggleBtn) {
        if (localStorage.getItem('sidebarState') === 'collapsed') {
            document.body.classList.add('sidebar-collapsed');
        }
        sidebarToggleBtn.addEventListener('click', () => {
            document.body.classList.toggle('sidebar-collapsed');
            const isCollapsed = document.body.classList.contains('sidebar-collapsed');
            localStorage.setItem('sidebarState', isCollapsed ? 'collapsed' : 'expanded');
        });
    }
</script>
</body></html>
